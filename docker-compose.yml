services:
  mongo:
    image: mongo:8
    container_name: fashion-mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: fashion-backend
    restart: unless-stopped

  

    env_file:
      - ./backend/.env

    environment:
      MONGO_URI: mongodb://mongo:27017/fashion_store

    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: fashion-frontend
    restart: unless-stopped

   

    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: fashion-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend
      - backend

volumes:
  mongo_data: